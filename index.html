<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Digital Marketing Lab | Blackboard Growth Tracker</title>
  <!-- SEO Meta Tags -->
  <meta name="description" content="An interactive chalkboard-themed AI performance tracker and growth dashboard for digital marketers. Track skills progress, campaign marks, and rankings.">
  <meta name="keywords" content="AI Marketing, Digital Marketing, Prompt Engineering, Copywriting, SEO, Analytics, Leaderboard">
  <!-- Stylesheets -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Global App Layout -->
  <div class="app-container">
    
    <!-- Application Header -->
    <header>
      <div class="logo">
        <div class="logo-icon" style="background: var(--grad-primary); color: #000; font-family: var(--font-chalk);">🧪</div>
        <div class="logo-text">
          <h1 style="letter-spacing: 0.05em;" class="chalk-text">Blackboard Growth Lab</h1>
          <p style="color: #86efac; font-weight: 600; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 0.1em;">AI Growth Marketing Hub</p>
        </div>
      </div>
      
      <!-- Primary Navigation -->
      <nav class="tabs-container">
        <button class="tab-btn active" data-tab="leaderboard" id="tab-leaderboard-btn">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-top: -2px;"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.45 1-1 1H4v2h16v-2h-5c-.55 0-1-.45-1-1v-2.34"/><path d="M12 2a6 6 0 0 1 6 6v5a6 6 0 0 1-6 6 6 6 0 0 1-6-6V8a6 6 0 0 1 6-6z"/></svg>
          Leaderboard
        </button>
        <button class="tab-btn" data-tab="dashboard" id="tab-dashboard-btn">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-top: -2px;"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          Learner Dashboard
        </button>
        <button class="tab-btn" data-tab="admin" id="tab-admin-btn">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-top: -2px;"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          Management View
        </button>
      </nav>
    </header>

    <!-- Dynamic Content Target -->
    <main id="main-content" class="tab-content">
      <!-- Dynamic components will render here via app.js -->
      <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 400px; color: var(--text-secondary);">
        <div style="border: 3px solid rgba(0, 242, 254, 0.2); border-top-color: #00f2fe; width: 40px; height: 40px; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 1.5rem;"></div>
        <p style="font-family: var(--font-display); font-weight: 500;">Loading Performance Modules...</p>
      </div>
    </main>

    <!-- Application Footer -->
    <footer>
      <p>&copy; 2026 AI Content Lab.</p>
    </footer>

  </div>

  <!-- Loading Application Script Files -->
  <script src="seedData.js"></script>
  <script src="components.js"></script>
  <script src="app.js"></script>

  <!-- Global Loader Spin Animation -->
  <style>
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</body>
</html>
